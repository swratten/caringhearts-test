backend:
  name: github
  repo: swratten/caringhearts-test
  branch: main
  base_url: https://sveltia-cms-auth.s-wratten89.workers.dev

media_folder: static/img
public_folder: /img

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home Page
        file: content/_index.md
        fields:
          - { label: Page Title, name: title, widget: string }
          - { label: Hero Heading, name: hero_heading, widget: string }
          - { label: Hero Subtext, name: hero_subtext, widget: string }
          - { label: About Text, name: about_text, widget: markdown }
          - label: Services
            name: services
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
          - { label: Mission Statement, name: mission, widget: text }
      - name: contact
        label: Contact Page
        file: content/contact.md
        fields:
          - { label: Intro Text, name: intro_text, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: Appointments, name: appointments, widget: string }
          - { label: Email, name: email, widget: string }
